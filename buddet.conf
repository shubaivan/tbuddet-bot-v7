<VirtualHost *:80>
    DocumentRoot "/home/ivan/hosts/buddetal/buddet_v7/public"
    ServerName   buddet.local

    <FilesMatch \.php$>
        SetHandler proxy:unix:/run/php/php-fpm.sock|fcgi://localhost
    </FilesMatch>

    <Directory "/home/ivan/hosts/buddetal/buddet_v7/public">
        AllowOverride All
        Require all granted
        FallbackResource /index.php
    </Directory>

    ErrorLog /var/log/apache2/buddet-error.log
    CustomLog /var/log/apache2/buddet-access.log combined
</VirtualHost>
