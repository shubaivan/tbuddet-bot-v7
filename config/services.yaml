# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    $telegramBotName: '%env(APP_TELEGRAM_BOT_NAME)%'
    telegram_bot_token: '%env(TELEGRAM_TOKEN)%'
    liqpay_public_key: '%env(LIQPAY_PUBLIC)%'
    liqpay_private_key: '%env(LIQPAY_PRIVATE)%'
    liqpay_server_url: '%env(SERVER_URL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $projectDir: '%kernel.project_dir%'
            $liqpayPublicKey: '%liqpay_public_key%'
            $liqpayPrivateKey: '%liqpay_private_key%'
            $liqpayServerUrl: '%liqpay_server_url%'
            $novaPoshtaApiKey: '%env(NOVA_POSHTA_API_KEY)%'
            $frontendUrl: '%env(FRONTEND_URL)%'
            $mailerFrom: '%env(MAILER_FROM)%'
            $jwtTtl: '%env(int:JWT_TTL)%'
            $jwtRefreshTtl: '%env(int:JWT_REFRESH_TTL)%'
            $defaultTargetRoute: 'app_admin'  # redirect after login success
            $guardRoute: 'login_guard'        # guard route
            $loginRoute: 'login_public'       # optional, if login fails user will be redirected there
            $telegramBotName: '%env(APP_TELEGRAM_BOT_NAME)%'
            $telegramBotToken: '%env(TELEGRAM_TOKEN)%'
            $telegramAdminBotName: '%env(APP_TELEGRAM_ADMIN_BOT_NAME)%'
            $telegramAdminBotToken: '%env(TELEGRAM_ADMIN_TOKEN)%'
            # Private chat used to upload new product images once on save so we
            # capture Telegram's file_id immediately. Defaults to empty string,
            # which disables eager warmup (bot will warm on first user encounter).
            $telegramWarmupChatId: '%env(string:default::TELEGRAM_WARMUP_CHAT_ID)%'
            # Persistent cache pool for Nutgram conversation/user state. Lives
            # outside var/cache so `rm -rf var/cache/prod` during deploy does
            # NOT wipe in-flight conversations.
            $nutgramCache: '@app.cache.nutgram'

    # Nutgram conversation/user/global state cache. Not tagged as cache.pool —
    # we don't want it cleared by `cache:clear` or wiped by the deploy step
    # that nukes var/cache/prod. Directory is created on first use.
    app.cache.nutgram:
        class: Symfony\Component\Cache\Adapter\FilesystemAdapter
        arguments:
            - 'nutgram'
            - 0
            - '%kernel.project_dir%/var/nutgram-cache'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/Telegram/Location/Model'
            - '../src/Telegram/Model'
            - '../src/Liqpay'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Nutgram handlers
    App\Telegram\:
        public: true
        shared: false
        resource: '../src/Telegram'
        exclude:
            - '../src/Telegram/Location/Model'
            - '../src/Telegram/Model'

    # Admin-side Telegram login uses a separate bot (artbeton_admin_bot) registered to the
    # api.artbeton.market domain. The customer SPA at artbeton.market keeps using the default
    # validator (prod_beton_decor_bot / TELEGRAM_TOKEN) via TelegramAuthController.
    admin_telegram_login_validator:
        class: App\Authenticator\TelegramLoginValidator
        arguments:
            $telegramBotToken: '%env(TELEGRAM_ADMIN_TOKEN)%'

    App\Authenticator\TelegramAuthenticator:
        arguments:
            $validator: '@admin_telegram_login_validator'

    App\EventListener\FilePathUploadListener:
        tags:
            - { name: doctrine.event_listener, event: prePersist }
            - { name: doctrine.event_listener, event: preUpdate }

    Aws\S3\S3Client:
        arguments:
            -
                version: '2006-03-01'
                region: '%env(BUCKETEER_AWS_REGION)%'
                credentials:
                    key: '%env(BUCKETEER_AWS_ACCESS_KEY_ID)%'
                    secret: '%env(BUCKETEER_AWS_SECRET_ACCESS_KEY)%'

    App\EventListener\ExceptionListener:
        tags:
            - { name: kernel.event_listener, event: kernel.exception }

    auth_api.event.jwt_created_listener:
        class: App\EventListener\JWTAuthenticationSuccessListener
        arguments:
            - '%env(JWT_TTL)%'
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_authentication_success, method: onJWTAuthenticationSuccess }

    App\Migrations\Factory\MigrationFactoryDecorator:
        decorates: 'doctrine.migrations.migrations_factory'
        arguments: ['@.inner', '@service_container']